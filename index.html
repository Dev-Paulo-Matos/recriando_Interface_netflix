<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://kit.fontawesome.com/60ab3af027.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./styles/olw/owl.theme.default.min.css">
    <link rel="stylesheet" href="./styles/olw/owl.carousel.min.css">
    <link rel="stylesheet" href="./styles/responsive.css">
</head>

<body>
    <header>
        <div class="container">
            <h2 class="logo">NETFLIX</h2>
            <nav>
                <a href="">Inicio</a>
                <a href="">Series</a>
                <a href="">Filmes</a>
                <a href="">Documentarios</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="flm-main">
            <div class="container">
                <h3 class="title">House Of Cards</h3>
                <p class="descricao">Nada pode impedir o político sem escrupulos Frank Underwood de conquistar
                    Washington</p>
                <div class="botoes">
                    <button role="button" class="botao">
                        <i class="fas fa-play"></i>
                        Assistir Agora</button>
                    <button role="button" class="botao"><i class="fas fa-info"></i>
                        Mais informações</button>
                </div>
            </div>
        </div>
    </main>
    <div class="crl owl-carousel owl-theme">
        <div id="item" class="item">
            <img class="box-flm" src="./img/flm1.jpg" alt="">
        </div>
        <div id="item" class="item">
            <img class="box-flm" src="./img/flm2.jpg" alt="">
        </div>
        <div id="item" class="item">
            <img class="box-flm" src="./img/flm3.jpg" alt="">
        </div>
        <div id="item" class="item">
            <img class="box-flm" src="./img/flm4.jpg" alt="">
        </div>
        <div id="item" class="item">
            <img class="box-flm" src="./img/flm5.jpg" alt="">
        </div>
        <div id="item" class="item">
            <img class="box-flm" src="./img/flm6.jpg" alt="">
        </div>
        <div id="item" class="item">
            <img class="box-flm" src="./img/flm7.jpg" alt="">
        </div>
        <div id="item" class="item">
            <img class="box-flm" src="./img/flm8.jpg" alt="">
        </div>

        </div>
        <script src="./js/olw/jquery.min.js"></script>
        <script src="./js/olw/owl.carousel.min.js"></script>
        <script src="./js/olw/main.js"></script>
</body>

</html>
